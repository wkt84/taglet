name: Build Taglet

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: taglet-windows-x64
            release_asset_name_pattern: Taglet_[version]_Windows_x64[setup][ext]
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: taglet-macos-intel
            release_asset_name_pattern: Taglet_[version]_macOS_Intel[ext]
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: taglet-macos-apple-silicon
            release_asset_name_pattern: Taglet_[version]_macOS_AppleSilicon[ext]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Taglet ${{ github.ref_name }}
          uploadUpdaterJson: true
          assetNamePattern: ${{ matrix.release_asset_name_pattern }}
          args: --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
